<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>设置 · AI 辅助备课系统</title>
  <link rel="stylesheet" href="./css/teacher.css" />
</head>
<body>

<!-- 顶部导航栏（与主页一致） -->
<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" id="userArea" onclick="toggleUserMenu()">
    <span class="username">User</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" data-i18n="profile" onclick="goProfile()">个人信息</div>
      <div class="menu-item" data-i18n="classInfo" onclick="goClassInfo()">班级信息</div>
      <div class="menu-item" data-i18n="settings" onclick="goSettings()">设置</div>
      <div class="menu-item logout" data-i18n="logout" onclick="logout()">退出登录</div>

    </div>
  </div>
</header>

<div class="layout">
  <!-- 侧边栏（与主页一致） -->
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html" data-i18n="dashboard">学情分析</a>
      <a class="menu-item" href="./index.html#lesson" data-i18n="lesson">教案生成</a>
      <a class="menu-item" href="./index.html#ppt" data-i18n="ppt">PPT 生成</a>
      <a class="menu-item" href="./index.html#exercise" data-i18n="exercise">习题设计</a>
      <a class="menu-item" href="./index.html#class" data-i18n="class">班级管理</a>
      
    </nav>
  </aside>

  <!-- 主内容区：设置 -->
  <main class="content">
  <h1 id="pageTitle">设置</h1>

  <div class="settings-layout">
    <!-- 左侧分组列表 -->
    <div class="settings-left">
      <!-- 个人信息 -->
      <section class="card settings-group">
        <div class="settings-group-title" data-s-i18n="sectionPersonal">个人信息</div>

        <a href="#" class="settings-item active" data-view="profile" data-s-i18n="itemProfile">
          个人资料
          <span class="chev">›</span>
        </a>
        <a href="#" class="settings-item" data-view="work" data-s-i18n="itemWork">
          工作信息
          <span class="chev">›</span>
        </a>


        <a href="#" class="settings-item" data-view="account" data-s-i18n="itemAccount">
          账号设置
          <span class="chev">›</span>
        </a>
      </section>

      <!-- 通用 -->
      <section class="card settings-group">
        <div class="settings-group-title" data-s-i18n="sectionGeneral">通用</div>

        <a href="#" class="settings-item" data-view="language" data-s-i18n="itemLanguage">
          语言设置
          <span class="chev">›</span>
        </a>

        <a href="#" class="settings-item" data-view="font" data-s-i18n="itemFont">
          字体设置
          <span class="chev">›</span>
        </a>
      </section>
    </div>

        <!-- 右侧详情区：点击左侧项后，这里会变化 -->
        <div class="settings-right">
          <section class="card" id="settingsPanel"></section>
        </div>
      </div>
    </main>

</div>

<!-- 共享：主页的通用交互（侧边栏/用户菜单/登录校验/应用全局设置） -->
<script src="./js/teacher.js"></script>
<!-- 设置页专属逻辑 -->
<script src="./js/settings.js"></script>
</body>
</html>
