<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">学生设置 · AI 辅助备课系统</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName" data-i18n="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()" data-i18n="menuSettings">设置</div>
      <div class="menu-item logout" onclick="logout()" data-i18n="menuLogout">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html" data-i18n="navOverview">学习概览</a>
      <a class="menu-item" href="./practice.html" data-i18n="navPractice">练习</a>
      <a class="menu-item" href="./review.html" data-i18n="navReview">复习</a>
      <a class="menu-item" href="./lessons.html" data-i18n="navLessons">教案资源</a>
      <a class="menu-item" href="./scores.html" data-i18n="navScores">成绩与学情</a>
      <a class="menu-item active" href="./settings.html" data-i18n="navSettings">设置</a>
    </nav>
  </aside>

  <main class="content">
    <h1 class="settings-page-title" data-i18n="pageHeading">设置</h1>

    <div class="settings-layout">
      <div class="settings-left">
        <section class="card settings-group">
          <div class="settings-group-title" data-i18n="sectionPersonal">个人信息</div>
          <a href="#" class="settings-nav-item active" data-view="profile">
            <span data-i18n="itemProfile">个人资料</span>
            <span class="chev">›</span>
          </a>
          <a href="#" class="settings-nav-item" data-view="account">
            <span data-i18n="itemAccount">账号安全</span>
            <span class="chev">›</span>
          </a>
        </section>

        <section class="card settings-group">
          <div class="settings-group-title" data-i18n="sectionGeneral">通用</div>
          <a href="#" class="settings-nav-item" data-view="language">
            <span data-i18n="itemLanguage">语言设置</span>
            <span class="chev">›</span>
          </a>
        </section>
      </div>

      <div class="settings-right">
        <section class="card settings-panel" id="settingsPanel">
          <div class="card-head">
            <div>
              <div class="card-title" data-i18n="accountSettingsTitle">账号设置</div>
              <div class="card-sub" data-i18n="accountSettingsSub">学生仅可修改头像、签名与登录密码</div>
            </div>
          </div>

          <div class="settings-view-panel active" data-panel="profile">
            <div class="panel-title" data-i18n="profilePanelTitle">个人资料</div>
            <div class="panel-desc" data-i18n="profilePanelDesc">可更新头像和个性签名。</div>

            <div class="settings-grid">
              <div class="settings-item">
                <label data-i18n="avatarLabel">头像</label>
                <div class="avatar-box">
                  <img src="../assets/avatar.png" alt="avatar" id="avatarPreview" />
                  <input type="file" id="avatarInput" accept="image/*" />
                </div>
              </div>

              <div class="settings-item">
                <label data-i18n="signatureLabel">签名</label>
                <textarea id="signatureInput" placeholder="写一句学习目标或鼓励自己的话" data-i18n-placeholder="signaturePlaceholder"></textarea>
              </div>
            </div>
          </div>

          <div class="settings-view-panel" data-panel="account">
            <div class="panel-title" data-i18n="accountPanelTitle">账号安全</div>
            <div class="panel-desc" data-i18n="accountPanelDesc">修改登录密码需先验证当前密码。</div>

            <div class="settings-grid">
              <div class="settings-item">
                <label data-i18n="passwordLabel">修改密码</label>
                <input type="password" id="passwordOld" placeholder="当前密码" data-i18n-placeholder="passwordOldPlaceholder" />
                <input type="password" id="passwordNew" placeholder="新密码" data-i18n-placeholder="passwordNewPlaceholder" />
                <input type="password" id="passwordConfirm" placeholder="确认新密码" data-i18n-placeholder="passwordConfirmPlaceholder" />
              </div>
            </div>
          </div>

          <div class="settings-view-panel" data-panel="language">
            <div class="panel-title" data-i18n="languagePanelTitle">语言设置</div>
            <div class="panel-desc" data-i18n="languagePanelDesc">修改后将同步整个学生端界面语言。</div>

            <div class="settings-grid">
              <div class="settings-item">
                <label data-i18n="languageLabel">界面语言</label>
                <select id="languageSelect">
                  <option value="zh" data-i18n="languageZh">简体中文</option>
                  <option value="en" data-i18n="languageEn">English</option>
                </select>
              </div>
            </div>
          </div>

          <div class="settings-actions">
            <button class="btn" id="btnReset" data-i18n="btnReset">重置</button>
            <button class="btn primary" id="btnSave" data-i18n="btnSave">保存设置</button>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>

<script src="../js/i18n.js"></script>
<script src="./js/student_common.js"></script>
<script src="./js/student_settings.js"></script>
</body>
</html>
