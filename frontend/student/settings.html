<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学生设置 · AI 辅助备课系统</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()">设置</div>
      <div class="menu-item logout" onclick="logout()">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html">学习概览</a>
      <a class="menu-item" href="./practice.html">练习</a>
      <a class="menu-item" href="./exam.html">考试</a>
      <a class="menu-item" href="./lessons.html">教案资源</a>
      <a class="menu-item" href="./scores.html">成绩与学情</a>
      <a class="menu-item active" href="./settings.html">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="card settings-card">
      <div class="card-head">
        <div>
          <div class="card-title">账号设置</div>
          <div class="card-sub">学生仅可修改头像、签名与登录密码</div>
        </div>
      </div>

      <div class="settings-grid">
        <div class="settings-item">
          <label>头像</label>
          <div class="avatar-box">
            <img src="../assets/avatar.png" alt="avatar" id="avatarPreview" />
            <input type="file" id="avatarInput" accept="image/*" />
          </div>
        </div>

        <div class="settings-item">
          <label>签名</label>
          <textarea id="signatureInput" placeholder="写一句学习目标或鼓励自己的话"></textarea>
        </div>

        <div class="settings-item">
          <label>修改密码</label>
          <input type="password" id="passwordOld" placeholder="当前密码" />
          <input type="password" id="passwordNew" placeholder="新密码" />
          <input type="password" id="passwordConfirm" placeholder="确认新密码" />
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn" id="btnReset">重置</button>
        <button class="btn primary" id="btnSave">保存设置</button>
      </div>
    </section>
  </main>
</div>

<script src="./js/student_common.js"></script>
<script src="./js/student_settings.js"></script>
</body>
</html>
