<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">练习作业 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName" data-i18n="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()" data-i18n="menuSettings">设置</div>
      <div class="menu-item logout" onclick="logout()" data-i18n="menuLogout">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html" data-i18n="navOverview">学习概览</a>
      <a class="menu-item active" href="./practice.html" data-i18n="navPractice">练习</a>
      <a class="menu-item" href="./review.html" data-i18n="navReview">复习</a>
      <a class="menu-item" href="./lessons.html" data-i18n="navLessons">教案资源</a>
      <a class="menu-item" href="./scores.html" data-i18n="navScores">成绩与学情</a>
      <a class="menu-item" href="./settings.html" data-i18n="navSettings">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="card exercise-card">
      <div class="card-head">
        <div>
          <div class="card-title" id="exerciseTitle">作业</div>
          <div class="card-sub" id="exerciseMeta">—</div>
        </div>
        <div class="hero-actions">
          <button class="btn" id="btnBack" data-i18n="btnBack">返回</button>
        </div>
      </div>
      <div class="exercise-body" id="exerciseBody"></div>
      <div class="exercise-actions">
        <button class="btn" id="exerciseSave" data-i18n="btnSave">保存</button>
        <button class="btn primary" id="exerciseSubmit" data-i18n="btnSubmit">提交</button>
      </div>
      <div class="exercise-tip" id="exerciseTip"></div>
    </section>
  </main>
</div>

<script src="../js/i18n.js"></script>
<script src="./js/student_common.js"></script>
<script src="./js/student_practice_do.js"></script>
</body>
</html>
