<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>考试 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()">设置</div>
      <div class="menu-item logout" onclick="logout()">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html">学习概览</a>
      <a class="menu-item" href="./practice.html">练习</a>
      <a class="menu-item active" href="./exam.html">考试</a>
      <a class="menu-item" href="./lessons.html">教案资源</a>
      <a class="menu-item" href="./scores.html">成绩与学情</a>
      <a class="menu-item" href="./settings.html">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="hero">
      <div>
        <h1 class="hero-title">考试入口</h1>
        <p class="hero-sub">按老师安排参加考试。</p>
      </div>
      <div class="hero-actions">
        <button class="btn primary" id="btnExam">进入考试</button>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <div class="card-title">当前可参加考试</div>
          <div class="card-sub">进入考试后请在规定时间内完成</div>
        </div>
      </div>
      <div class="exam-panel">
        <div class="exam-item">
          <div>
            <div class="exam-title">阶段测验 · 数学</div>
            <div class="exam-sub">20 题 · 40 分钟</div>
          </div>
          <button class="btn primary" id="btnStartExam">开始</button>
        </div>
        <div class="exam-item">
          <div>
            <div class="exam-title">随堂小测 · 英语</div>
            <div class="exam-sub">10 题 · 15 分钟</div>
          </div>
          <button class="btn" id="btnStartQuiz">开始</button>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="./js/student_common.js"></script>
<script src="./js/student_exam.js"></script>
</body>
</html>
