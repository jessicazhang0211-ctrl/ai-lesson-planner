<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>教案资源 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()">设置</div>
      <div class="menu-item logout" onclick="logout()">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html">学习概览</a>
      <a class="menu-item" href="./practice.html">练习</a>
      <a class="menu-item" href="./exam.html">考试</a>
      <a class="menu-item active" href="./lessons.html">教案资源</a>
      <a class="menu-item" href="./scores.html">成绩与学情</a>
      <a class="menu-item" href="./settings.html">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="hero">
      <div>
        <h1 class="hero-title">老师教案资源</h1>
        <p class="hero-sub">查看老师发布的教案与学习资料。</p>
      </div>
      <div class="hero-actions">
        <button class="btn" id="btnRefreshLessons">刷新</button>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <div class="card-title">教案列表</div>
          <div class="card-sub">点击查看详情</div>
        </div>
      </div>
      <div class="lesson-list" id="lessonList"></div>
    </section>
  </main>
</div>

<script src="./js/student_common.js"></script>
<script src="./js/student_lessons.js"></script>
</body>
</html>
