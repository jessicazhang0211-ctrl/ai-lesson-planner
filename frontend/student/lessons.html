<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">教案资源 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName" data-i18n="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()" data-i18n="menuSettings">设置</div>
      <div class="menu-item logout" onclick="logout()" data-i18n="menuLogout">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html" data-i18n="navOverview">学习概览</a>
      <a class="menu-item" href="./practice.html" data-i18n="navPractice">练习</a>
      <a class="menu-item" href="./review.html" data-i18n="navReview">复习</a>
      <a class="menu-item active" href="./lessons.html" data-i18n="navLessons">教案资源</a>
      <a class="menu-item" href="./scores.html" data-i18n="navScores">成绩与学情</a>
      <a class="menu-item" href="./settings.html" data-i18n="navSettings">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="hero">
      <div>
        <h1 class="hero-title" data-i18n="heroTitle">老师教案资源</h1>
        <p class="hero-sub" data-i18n="heroSub">查看老师发布的教案与学习资料。</p>
      </div>
      <div class="hero-actions">
        <button class="btn" id="btnRefreshLessons" data-i18n="btnRefresh">刷新</button>
      </div>
    </section>

    <section class="lesson-layout">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title" data-i18n="listTitle">教案列表</div>
            <div class="card-sub" data-i18n="listSub">点击查看详情</div>
          </div>
        </div>
        <div class="lesson-list" id="lessonList"></div>
      </div>

      <div class="card lesson-detail">
        <div class="card-head">
          <div>
            <div class="card-title" id="lessonTitle">—</div>
            <div class="card-sub" id="lessonMeta">—</div>
          </div>
          <div class="lesson-actions">
            <button class="btn" id="btnDownloadPdf" data-i18n="btnDownloadPdf">下载 PDF</button>
          </div>
        </div>
        <pre class="lesson-content" id="lessonContent"></pre>
        <div class="lesson-empty" id="lessonEmpty" data-i18n="emptyHint">选择左侧教案查看详情</div>
      </div>
    </section>
  </main>
</div>

<script src="../js/i18n.js"></script>
<script src="./js/student_common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="./js/student_lessons.js"></script>
</body>
</html>
