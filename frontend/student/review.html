<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="pageTitle">复习 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName" data-i18n="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()" data-i18n="menuSettings">设置</div>
      <div class="menu-item logout" onclick="logout()" data-i18n="menuLogout">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html" data-i18n="navOverview">学习概览</a>
      <a class="menu-item" href="./practice.html" data-i18n="navPractice">练习</a>
      <a class="menu-item active" href="./review.html" data-i18n="navReview">复习</a>
      <a class="menu-item" href="./lessons.html" data-i18n="navLessons">教案资源</a>
      <a class="menu-item" href="./scores.html" data-i18n="navScores">成绩与学情</a>
      <a class="menu-item" href="./settings.html" data-i18n="navSettings">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="hero">
      <div>
        <h1 class="hero-title" data-i18n="heroTitle">复习与错题</h1>
        <p class="hero-sub" data-i18n="heroSub">已完成作业自动归档，可查看错题解析。</p>
      </div>
      <div class="hero-actions">
        <button class="btn" id="btnRefreshReview" data-i18n="btnRefresh">刷新</button>
      </div>
    </section>

    <section class="card review-filters">
      <div class="review-filter">
        <label data-i18n="filterTitleLabel">作业名称</label>
        <input id="reviewTitleKeyword" placeholder="输入作业名称" data-i18n-placeholder="filterTitlePlaceholder" />
      </div>
      <div class="review-filter">
        <button class="btn" id="btnReviewSearch" data-i18n="btnFilter">筛选</button>
      </div>
    </section>

    <section class="review-layout">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title" data-i18n="listTitle">已完成作业</div>
            <div class="card-sub" data-i18n="listSub">点击查看错题与解析</div>
          </div>
        </div>
        <div class="list" id="reviewList"></div>
      </div>

      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title" id="reviewTitle">错题解析</div>
            <div class="card-sub" id="reviewMeta">—</div>
          </div>
          <label class="review-filter">
            <input type="checkbox" id="toggleWrongOnly" checked />
            <span data-i18n="toggleWrongOnly">只看错题</span>
          </label>
        </div>
        <div class="review-body" id="reviewBody"></div>
      </div>
    </section>
  </main>
</div>

<script src="../js/i18n.js"></script>
<script src="./js/student_common.js"></script>
<script src="./js/student_review.js"></script>
</body>
</html>
