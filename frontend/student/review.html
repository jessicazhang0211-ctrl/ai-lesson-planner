<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>复习 · 学生端</title>
  <link rel="stylesheet" href="./css/student.css" />
</head>
<body>

<header class="topbar">
  <div class="topbar-left" onclick="goHome()">
    <img src="../assets/logo.png" class="logo" alt="logo" />
    <span class="system-name" id="appName">AI 辅助备课系统</span>
  </div>

  <div class="topbar-right" onclick="toggleUserMenu()">
    <span class="username" id="studentName">Student</span>
    <img src="../assets/avatar.png" class="avatar" alt="avatar" id="studentAvatar" />
    <div class="user-menu" id="userMenu">
      <div class="menu-item" onclick="goSettings()">设置</div>
      <div class="menu-item logout" onclick="logout()">退出登录</div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">☰</div>
    <nav class="menu">
      <a class="menu-item" href="./index.html">学习概览</a>
      <a class="menu-item" href="./practice.html">练习</a>
      <a class="menu-item active" href="./review.html">复习</a>
      <a class="menu-item" href="./lessons.html">教案资源</a>
      <a class="menu-item" href="./scores.html">成绩与学情</a>
      <a class="menu-item" href="./settings.html">设置</a>
    </nav>
  </aside>

  <main class="content">
    <section class="hero">
      <div>
        <h1 class="hero-title">复习与错题</h1>
        <p class="hero-sub">已完成作业自动归档，可查看错题解析。</p>
      </div>
      <div class="hero-actions">
        <button class="btn" id="btnRefreshReview">刷新</button>
      </div>
    </section>

    <section class="card review-filters">
      <div class="review-filter">
        <label>作业名称</label>
        <input id="reviewTitleKeyword" placeholder="输入作业名称" />
      </div>
      <div class="review-filter">
        <button class="btn" id="btnReviewSearch">筛选</button>
      </div>
    </section>

    <section class="review-layout">
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">已完成作业</div>
            <div class="card-sub">点击查看错题与解析</div>
          </div>
        </div>
        <div class="list" id="reviewList"></div>
      </div>

      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title" id="reviewTitle">错题解析</div>
            <div class="card-sub" id="reviewMeta">—</div>
          </div>
          <label class="review-filter">
            <input type="checkbox" id="toggleWrongOnly" checked />
            只看错题
          </label>
        </div>
        <div class="review-body" id="reviewBody"></div>
      </div>
    </section>
  </main>
</div>

<script src="../js/i18n.js"></script>
<script src="./js/student_common.js"></script>
<script src="./js/student_review.js"></script>
</body>
</html>
